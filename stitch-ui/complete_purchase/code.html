<script>
        function selectMethod(el) {
            // Remove selected class from all siblings
            const parent = el.parentElement;
            parent.querySelectorAll('.group').forEach(item => {
                item.classList.remove('selected');
                const circle = item.querySelector('.w-6.h-6');
                if (circle) {
                    circle.classList.remove('border-primary', 'bg-primary');
                    circle.classList.add('border-outline-variant');
                    circle.querySelector('div').classList.add('opacity-0');
                }
            });

            // Add selected class to clicked
            el.classList.add('selected');
            const circle = el.querySelector('.w-6.h-6');
            if (circle) {
                circle.classList.add('border-primary', 'bg-primary');
                circle.classList.remove('border-outline-variant');
                circle.querySelector('div').classList.remove('opacity-0');
            }
        }

        const buyBtn = document.getElementById('buyBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');

        buyBtn.addEventListener('click', () => {
            // Simple loading state simulation
            btnText.textContent = "PROCESSING...";
            btnIcon.textContent = "sync";
            btnIcon.classList.add('animate-spin');
            buyBtn.style.pointerEvents = 'none';
            buyBtn.style.opacity = '0.8';

            setTimeout(() => {
                btnText.textContent = "SUCCESSFUL";
                btnIcon.textContent = "check_circle";
                btnIcon.classList.remove('animate-spin');
                buyBtn.style.background = '#10b981'; // Green for success
                
                // Redirect or show success modal
                setTimeout(() => {
                    alert('Purchase confirmed! 5,000 Coins added to your account.');
                    window.location.reload();
                }, 1000);
            }, 2000);
        });
    </script>
