<script>
    // Micro-interaction: Marquee effect for long text
    const style = document.createElement('style');
    style.textContent = `
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
    `;
    document.head.appendChild(style);

    // Heart interaction
    const heartBtn = document.querySelector('button .group-hover\\:text-red-500');
    if (heartBtn) {
        heartBtn.parentElement.addEventListener('click', function() {
            const icon = this.querySelector('.material-symbols-outlined');
            const fill = icon.style.fontVariationSettings.includes("'FILL' 1");
            icon.style.fontVariationSettings = fill ? "'FILL' 0" : "'FILL' 1";
            icon.classList.toggle('text-red-500');
        });
    }
</script>
