<!-- Interactive Elements Scripts -->
<script>
        // Trigger legendary dragon animation on load
        window.addEventListener('DOMContentLoaded', () => {
            const alert = document.getElementById('gift-alert');
            setTimeout(() => {
                alert.classList.remove('opacity-0');
                alert.classList.add('opacity-100');
                
                // Hide after 4 seconds
                setTimeout(() => {
                    alert.classList.remove('opacity-100');
                    alert.classList.add('opacity-0');
                }, 4000);
            }, 1000);
        });

        // Floating Hearts Logic
        const reactionsContainer = document.getElementById('reactions-container');
        const likeBtn = document.getElementById('like-btn');
        const colors = ['#d2bbff', '#b4c5ff', '#ffb784', '#7c3aed', '#ffb4ab'];

        function spawnHeart() {
            const heart = document.createElement('div');
            heart.classList.add('absolute', 'bottom-0', 'animate-float-up', 'material-symbols-outlined');
            heart.style.left = Math.random() * 60 + 'px';
            heart.style.color = colors[Math.floor(Math.random() * colors.length)];
            heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
            heart.style.fontVariationSettings = "'FILL' 1";
            heart.textContent = 'favorite';
            
            reactionsContainer.appendChild(heart);
            
            // Remove after animation
            setTimeout(() => heart.remove(), 3000);
        }

        // Auto spawn some hearts for "liveness"
        setInterval(spawnHeart, 800);

        // Click to spawn
        likeBtn.addEventListener('click', () => {
            for(let i=0; i<5; i++) {
                setTimeout(spawnHeart, i * 100);
            }
        });

        // Simple Gift Button Micro-interaction
        const giftBtn = document.getElementById('gift-btn');
        giftBtn.addEventListener('click', () => {
            giftBtn.classList.add('scale-90');
            setTimeout(() => giftBtn.classList.remove('scale-90'), 150);
            
            // Re-trigger the big gift alert for demo purposes
            const alert = document.getElementById('gift-alert');
            alert.classList.remove('opacity-0');
            alert.classList.add('opacity-100');
            setTimeout(() => {
                alert.classList.remove('opacity-100');
                alert.classList.add('opacity-0');
            }, 3000);
        });
    </script>
