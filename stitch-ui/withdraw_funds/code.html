<script>
        const diamondInput = document.getElementById('diamondInput');
        const usdValueDisplay = document.getElementById('usdValue');

        diamondInput.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value) || 0;
            const usd = (val / 10).toFixed(2);
            usdValueDisplay.textContent = `Will receive: $${usd} USD`;
        });

        // Simple button micro-interaction
        const withdrawBtn = document.querySelector('button.vibrant-gradient');
        withdrawBtn.addEventListener('click', () => {
            withdrawBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Processing...';
            setTimeout(() => {
                withdrawBtn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Success!';
                withdrawBtn.classList.remove('vibrant-gradient');
                withdrawBtn.classList.add('bg-green-500');
            }, 1500);
        });
    </script>
